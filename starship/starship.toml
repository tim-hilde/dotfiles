"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$hostname\
$directory\
$python\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "blue"
truncate_to_repo = false
truncation_length = 5

[username]
format = "[$user]($style)@"

[hostname]
ssh_symbol = ""
aliases = { "Mac" = "MacbookPro" }

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)]($style) "
style = "cyan"
conflicted = " \b"
untracked = " \b"
modified = " \b"
staged = " \b"
renamed = " \b"
deleted = " \b"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"


[profiles]
claude-code = "$directory$git_branch$git_statusXXXX$claude_context$claude_model$claude_cost"

[claude_model]
format = "[$model]($style) "
symbol = ""
style = "bright-black"

[claude_model.model_aliases]
"Claude Opus 4.7" = "opus"
"Claude Opus 4.6" = "opus"
"Claude Sonnet 4.6" = "sonnet"
"Claude Haiku 4.5" = "haiku"
"Opus" = "opus"
"Sonnet" = "sonnet"
"Haiku" = "haiku"

[claude_context]
format = "[$gauge $percentage]($style) "
gauge_width = 5
gauge_full_symbol = "█"
gauge_partial_symbol = "▒"
gauge_empty_symbol = "░"

[[claude_context.display]]
threshold = 0
style = "bright-black"

[[claude_context.display]]
threshold = 30
style = "cyan"

[[claude_context.display]]
threshold = 60
style = "yellow"

[[claude_context.display]]
threshold = 80
style = "red"

[claude_cost]
format = "[\\$$cost]($style)"
symbol = ""

[[claude_cost.display]]
threshold = 0.0
hidden = true

[[claude_cost.display]]
threshold = 1.0
style = "yellow"

[[claude_cost.display]]
threshold = 5.0
style = "red"
